name: "Bug Report"
description: "Report something that isn't working correctly"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide enough detail so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Claude Code with StatsClaw
        2. Run prompt "..."
        3. See error at step ...
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      description: Which workflow were you running?
      options:
        - Code Change (workflow 1/2)
        - Docs Only (workflow 3)
        - Issue Patrol (workflow 4)
        - Single Issue Fix (workflow 5)
        - Validation (workflow 6)
        - Ship / Review (workflow 7/8)
        - Simulation (workflow 11/12)
        - Simplified (workflow 10)
        - Other / Unknown
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Claude Code version, target language/repo type"
      placeholder: "macOS 14, Claude Code 1.x, R package"
    validations:
      required: false
